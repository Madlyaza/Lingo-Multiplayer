services:

  # ─── Laravel API (PHP-FPM) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lingo_multiplayer
      DB_USERNAME: lingo
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lingo-network
    restart: unless-stopped

  # ─── Nginx (serves the Laravel API) ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - lingo-network
    restart: unless-stopped

  # ─── Vue / Vite Dev Server ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - lingo-network
    restart: unless-stopped

  # ─── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: lingo_multiplayer
      MYSQL_USER: lingo
      MYSQL_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lingo-network
    restart: unless-stopped

  # ─── Laravel Scheduler ────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lingo_multiplayer
      DB_USERNAME: lingo
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lingo-network
    restart: unless-stopped

  # ─── phpMyAdmin ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: lingo
      PMA_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lingo-network
    restart: unless-stopped

networks:
  lingo-network:
    driver: bridge

volumes:
  db-data:
  backend-vendor:
  frontend-node-modules:
